<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Friends | Kokoa Clone</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script
      src="https://kit.fontawesome.com/6478f529f2.js"
      crossorigin="anonymous"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>
  <body class="">
    <div class="status-bar">
      <div class="status-bar__column">
        <span>No Service</span><i class="fa-solid fa-wifi"></i>
      </div>
      <div class="status-bar__column"><span>21:23</span></div>
      <div class="status-bar__column">
        <i class="fa-solid fa-lock"></i><span>100%</span
        ><i class="fa-solid fa-battery-full"></i>
      </div>
    </div>
    <header class="screen-header">
      <h1 class="screen-header__title">Friends</h1>
      <div class="screen-header__icons">
        <span><i class="fa-solid fa-magnifying-glass"></i></span
        ><span><i class="fa-solid fa-music"></i></span
        ><span
          ><a href="settings.html"><i class="fa-solid fa-gear"></i></a
        ></span>
      </div>
    </header>
    <a class="friends-display-link"
      ><i class="fa-solid fa-circle-info"></i> Friends' Names Display
      <i class="fa-solid fa-chevron-right"></i
    ></a>
    <main class="friends-screen main-screen">
      <div class="user-component">
        <div class="user-component__column">
          <img
            class="user-component__avatar user-component__avatar--xl"
            src="img/profile.jpg"
          />
          <div><h4 class="user-component__title">DH</h4></div>
        </div>
      </div>
      <div class="friends-screen__channel">
        <div class="friends-screen__channel-header">
          <span>Channel</span><i class="fa-solid fa-chevron-up"></i>
        </div>
        <div class="user-component">
          <div class="user-component__column">
            <div class="channel-icon"><span>Ch</span></div>
            <div><h4 class="user-component__title">Channel</h4></div>
          </div>
          <div class="channel-count">
            <span>2</span><i class="fa-solid fa-chevron-right"></i>
          </div>
        </div>
      </div>
    </main>
    <nav class="nav">
      <ul class="nav__list">
        <li>
          <a class="nav__link" href="friends.html"
            ><i class="fa-regular fa-user"></i
          ></a>
        </li>
        <li>
          <a class="nav__link" href="chats.html"
            ><span class="nav__notification badge">1</span
            ><i class="fa-regular fa-comment"></i
          ></a>
        </li>
        <li>
          <a class="nav__link" href="find.html"
            ><i class="fa-solid fa-magnifying-glass"></i
          ></a>
        </li>
        <li>
          <a class="nav__link" href="more.html"
            ><span class="nav__dot dot"></span
            ><i class="fa-solid fa-ellipsis"></i
          ></a>
        </li>
      </ul>
    </nav>
  </body>
</html>
