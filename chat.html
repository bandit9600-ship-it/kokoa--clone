<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat | Kokoa Clone</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script
      src="https://kit.fontawesome.com/6478f529f2.js"
      crossorigin="anonymous"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>
  <body class="chat-body">
    <div class="status-bar">
      <div class="status-bar__column">
        <span>No Service</span><i class="fa-solid fa-wifi"></i>
      </div>
      <div class="status-bar__column"><span>21:23</span></div>
      <div class="status-bar__column">
        <i class="fa-solid fa-lock"></i><span>100%</span
        ><i class="fa-solid fa-battery-full"></i>
      </div>
    </div>
    <header class="alt-header">
      <div class="alt-header__column">
        <a href="chats.html"><i class="fa-solid fa-chevron-left"></i></a>
      </div>
      <div class="alt-header__column">DH</div>
      <div class="alt-header__column">
        <i class="fa-solid fa-magnifying-glass"></i>
        <i class="fa-solid fa-bars"></i>
      </div>
    </header>
    <main class="main-chat">
      <div class="chat__timestamp">Tuesday, June 30, 2020</div>
      <div class="message-row">
        <img src="img/profile.jpg" />
        <div class="message-row__content">
          <span class="message__author">DH</span>
          <div class="message__info">
            <span class="message__bubble">Hi!</span
            ><span class="message__time">21:27</span>
          </div>
        </div>
      </div>
      <div class="message-row message-row--own">
        <div class="message-row__content">
          <div class="message__info">
            <span class="message__bubble">What’s up?</span
            ><span class="message__time">21:27</span>
          </div>
        </div>
      </div>
    </main>
    <form class="reply">
      <div class="reply__column"><i class="fa-regular fa-square-plus"></i></div>
      <div class="reply__column">
        <input type="text" value="Hi!" /><i class="fa-regular fa-face-smile"></i
        ><button><i class="fa-solid fa-arrow-up"></i></button>
      </div>
    </form>
    <div class="keyboard">
      <div class="key">q</div>
      <div class="key">w</div>
      <div class="key">e</div>
      <div class="key">r</div>
      <div class="key">t</div>
      <div class="key">y</div>
      <div class="key">u</div>
      <div class="key">i</div>
      <div class="key">o</div>
      <div class="key">p</div>
      <div class="key">a</div>
      <div class="key">s</div>
      <div class="key">d</div>
      <div class="key">f</div>
      <div class="key">g</div>
      <div class="key">h</div>
      <div class="key">j</div>
      <div class="key">k</div>
      <div class="key">l</div>
      <div class="key gray"><i class="fa-solid fa-arrow-up"></i></div>
      <div class="key">z</div>
      <div class="key">x</div>
      <div class="key">c</div>
      <div class="key">v</div>
      <div class="key">b</div>
      <div class="key">n</div>
      <div class="key">m</div>
      <div class="key gray"><i class="fa-regular fa-delete-left"></i></div>
      <div class="key gray">123</div>
      <div class="key gray"><i class="fa-solid fa-globe"></i></div>
      <div class="key gray"><i class="fa-solid fa-microphone"></i></div>
      <div class="key space">space</div>
      <div class="key return">return</div>
    </div>
  </body>
</html>
