<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>More | Kokoa Clone</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script
      src="https://kit.fontawesome.com/6478f529f2.js"
      crossorigin="anonymous"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>
  <body class="">
    <div class="status-bar">
      <div class="status-bar__column">
        <span>No Service</span><i class="fa-solid fa-wifi"></i>
      </div>
      <div class="status-bar__column"><span>21:23</span></div>
      <div class="status-bar__column">
        <i class="fa-solid fa-lock"></i><span>100%</span
        ><i class="fa-solid fa-battery-full"></i>
      </div>
    </div>
    <header class="screen-header">
      <h1 class="screen-header__title">More</h1>
      <div class="screen-header__icons">
        <span><i class="fa-solid fa-magnifying-glass"></i></span
        ><span><i class="fa-solid fa-music"></i></span
        ><span
          ><a href="settings.html"
            ><span class="dot"></span><i class="fa-solid fa-gear"></i></a
        ></span>
      </div>
    </header>
    <main class="main-screen more-screen">
      <div class="user-component">
        <div></div>
        <div class="user-component__column">
          <img
            class="user-component__avatar user-component__avatar--xl"
            src="img/profile.jpg"
          />
          <div>
            <h4 class="user-component__title">DH</h4>
            <h6 class="user-component__subtitle">+1 787-493-4219 ❗</h6>
          </div>
        </div>
        <div class="user-component__column">
          <i class="fa-regular fa-message"></i>
        </div>
      </div>
      <div class="icon-row">
        <div class="icon-row__icon">
          <i class="fa-regular fa-calendar-check"></i><span>Calendar</span>
        </div>
        <div class="icon-row__icon">
          <span class="dot icon-row__dot"></span
          ><i class="fa-regular fa-folder"></i><span>Talk Drive</span>
        </div>
        <div class="icon-row__icon">
          <i class="fa-regular fa-face-smile"></i><span>Emoticons</span>
        </div>
        <div class="icon-row__icon">
          <i class="fa-solid fa-brush"></i><span>Themes</span>
        </div>
        <div class="icon-row__icon">
          <i class="fa-solid fa-circle-nodes"></i><span>Account</span>
        </div>
        <div class="icon-row__icon">
          <i class="fa-regular fa-comments"></i><span>Openchat</span>
        </div>
      </div>
      <section class="suggestions">
        <h4 class="suggestions__title">Suggestions</h4>
        <div class="suggestions__icons">
          <div class="suggestions__icon">
            <div class="suggestions__icon-image">
              <i class="fa-solid fa-quote-right"></i>
            </div>
            <span>Kakao Story</span>
          </div>
          <div class="suggestions__icon">
            <div class="suggestions__icon-image">🦁</div>
            <span>kakao friends</span>
          </div>
          <div class="suggestions__icon">
            <div class="suggestions__icon-image">🐯</div>
            <span>Friends Gem</span>
          </div>
        </div>
      </section>
    </main>
    <nav class="nav">
      <ul class="nav__list">
        <li>
          <a class="nav__link" href="friends.html"
            ><i class="fa-regular fa-user"></i
          ></a>
        </li>
        <li>
          <a class="nav__link" href="chats.html"
            ><span class="nav__notification badge">1</span
            ><i class="fa-regular fa-comment"></i
          ></a>
        </li>
        <li>
          <a class="nav__link" href="find.html"
            ><i class="fa-solid fa-magnifying-glass"></i
          ></a>
        </li>
        <li>
          <a class="nav__link" href="more.html"
            ><span class="nav__dot dot"></span
            ><i class="fa-solid fa-ellipsis"></i
          ></a>
        </li>
      </ul>
    </nav>
  </body>
</html>
